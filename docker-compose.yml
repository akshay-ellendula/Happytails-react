version: '3.8'

services:
  redis:
    image: redis:alpine
    container_name: redis_cache
    ports:
      - "6379:6379"

  backend:
    build: 
      context: ./backend
    container_name: happytails_backend
    ports:
      - "5001:5001"
    env_file:
      - ./backend/.env
    environment:
      - REDIS_URL=redis://redis:6379
    volumes:
      - ./backend:/app
      - /app/node_modules
    depends_on:
      - redis

  frontend:
    build:
      context: ./frontend
    container_name: happytails_frontend
    ports:
      - "5173:5173"
    environment:
      - VITE_DOCKER_ENV=true
    volumes:
      - ./frontend:/app
      - /app/node_modules
    depends_on:
      - backend
