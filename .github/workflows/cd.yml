name: CD

on:
  workflow_run:
    workflows:
      - CI
    types:
      - completed
  workflow_dispatch:

permissions:
  contents: read

jobs:
  read-config:
    name: Read CI/CD config
    runs-on: ubuntu-latest
    outputs:
      strict_mode: ${{ steps.load.outputs.strict_mode }}
      block_deploy: ${{ steps.guard.outputs.block_deploy }}

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          ref: ${{ github.event_name == 'workflow_run' && github.event.workflow_run.head_sha || github.sha }}

      - name: Load strict mode
        id: load
        run: |
          STRICT_MODE=$(node -e "const fs=require('fs'); try { const cfg=JSON.parse(fs.readFileSync('.github/ci-cd-config.json','utf8')); process.stdout.write(String(Boolean(cfg.strictMode))); } catch { process.stdout.write('false'); }")
          echo "strict_mode=$STRICT_MODE" >> "$GITHUB_OUTPUT"

      - name: Block blank or fake imports
        id: guard
        run: |
          # Check for incomplete imports with various patterns
          PATTERN='this-package-does-not-exist-123|backend-package-not-installed-123|BrokenPkg|BrokenBackendPkg|from[ \t]*["'"'"'][ \t]*["'"'"']|from[ \t]*;|import[ \t]*{[ \t]*}[ \t]*from|import.*from[ \t]*$|import.*from[ \t]*;'
          if grep -REn "$PATTERN" frontend/src backend/src 2>/dev/null; then
            echo "block_deploy=true" >> "$GITHUB_OUTPUT"
            echo "Deployment blocked because a blank or fake import was detected."
          else
            echo "block_deploy=false" >> "$GITHUB_OUTPUT"
          fi

  deploy:
    name: Trigger Render and Vercel Deploys
    runs-on: ubuntu-latest
    needs: read-config
    if: |
      needs.read-config.outputs.block_deploy != 'true' &&
      (
      github.event_name == 'workflow_dispatch' ||
      (github.event_name == 'workflow_run' &&
      github.event.workflow_run.head_branch == 'main' &&
      (needs.read-config.outputs.strict_mode != 'true' || github.event.workflow_run.conclusion == 'success'))
      )

    steps:
      - name: Trigger Render deploy hook
        env:
          RENDER_DEPLOY_HOOK_URL: ${{ secrets.RENDER_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$RENDER_DEPLOY_HOOK_URL" ]; then
            echo "RENDER_DEPLOY_HOOK_URL is not configured."
            exit 1
          fi
          curl -fsS -X POST "$RENDER_DEPLOY_HOOK_URL"
          echo "Render deploy triggered."

      - name: Trigger Vercel deploy hook
        env:
          VERCEL_DEPLOY_HOOK_URL: ${{ secrets.VERCEL_DEPLOY_HOOK_URL }}
        run: |
          if [ -z "$VERCEL_DEPLOY_HOOK_URL" ]; then
            echo "VERCEL_DEPLOY_HOOK_URL is not configured."
            exit 1
          fi
          curl -fsS -X POST "$VERCEL_DEPLOY_HOOK_URL"
          echo "Vercel deploy triggered."

      - name: Deployment summary
        run: |
          {
            echo "# CD Report"
            echo
            echo "- Render deploy hook: triggered"
            echo "- Vercel deploy hook: triggered"
            echo "- Trigger: ${{ github.event_name }}"
            echo "- Run ID: ${{ github.run_id }}"
          } >> "$GITHUB_STEP_SUMMARY"
