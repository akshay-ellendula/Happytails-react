name: Backend Tests

on:
  push:
    paths:
      - "backend/**"
      - ".github/workflows/backend-test.yml"
  pull_request:
    paths:
      - "backend/**"
      - ".github/workflows/backend-test.yml"

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  test-backend:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: backend
    env:
      NODE_ENV: test
      JWT_SECRET_KEY: ci-test-secret
      FRONTEND_URL: http://localhost:5173
      BACKEND_URL: http://localhost:5001
      GOOGLE_CLIENT_ID: ci-google-client
      GOOGLE_CLIENT_SECRET: ci-google-secret
      GOOGLE_CALLBACK_URL: http://localhost:5001/api/auth/google/callback
      CLOUDINARY_CLOUD_NAME: ci-cloud
      CLOUDINARY_API_KEY: ci-key
      CLOUDINARY_API_SECRET: ci-secret
      EMAIL_USERNAME: ci@example.com
      EMAIL_PASSWORD: ci-password
      UPSTASH_REDIS_REST_URL: https://mock.upstash.io
      UPSTASH_REDIS_REST_TOKEN: ci-mock-token
    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: backend/package-lock.json

      - name: Install dependencies
        run: npm ci

      - name: Run backend tests
        run: npm run test:coverage

      - name: Upload coverage report
        uses: actions/upload-artifact@v4
        with:
          name: backend-coverage-report
          path: backend/coverage/
